<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; background: #0b0f19; color: #94a3b8; font-family: -apple-system, sans-serif; padding: 20px; margin: 0; }
    h2 { color: #ffffff; font-size: 16px; margin: 0 0 5px 0; }
    p { font-size: 12px; margin-bottom: 15px; }
    input { width: 100%; box-sizing: border-box; padding: 10px; background: #131a26; border: 1px solid #232d3f; color: #fff; border-radius: 4px; margin-bottom: 10px; outline: none; }
    input:focus { border-color: #3b82f6; }
    button { width: 100%; padding: 10px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    button:hover { background: #2563eb; }
    #status { margin-top: 10px; font-size: 12px; font-weight: bold; text-align: center; }
    .success { color: #10b981; }
    .error { color: #f43f5e; }
  </style>
</head>
<body>
  <h2>ScamShield Pro</h2>
  <p>Enter your commercial license key to activate live scanning.</p>
  <input type="text" id="licenseKey" placeholder="e.g. PRO-XXXX-XXXX">
  <button id="activateBtn">Verify License</button>
  <div id="status"></div>

  <script src="index.js"></script>
</body>
</html>
